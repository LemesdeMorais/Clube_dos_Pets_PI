<!DOCTYPE html>
<html lang="pt-br">
    

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Clube dos Pets</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: #f8f8f8;
            color: #222;
        }

        :root {
            --black: #111;
            --gray: #666;
            --light-gray: #ddd;
            --white: #fff;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: auto;
        }

        header {
            background: white;
            border-bottom: 1px solid var(--light-gray);
            padding: 15px 0;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav {
            display: flex;
            gap: 10px;
        }

        .btn,
        .btn-link {
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn {
            background: var(--black);
            color: white;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-link {
            color: var(--black);
        }

        .categories {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 25px 0;
        }

        .cat-item {
            min-width: 90px;
            background: white;
            border: 1px solid var(--light-gray);
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
            color: var(--black);
            font-size: 14px;
            transition: 0.3s;
        }

        .cat-item:hover {
            transform: translateY(-2px);
            border-color: var(--black);
        }

        .login-container {
            max-width: 450px;
            margin: 40px auto 60px;
            padding: 40px;
            border: 1px solid var(--light-gray);
            border-radius: 20px;
            background: white;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .login-container img {
            height: 80px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .login-container h2 {
            margin-bottom: 10px;
            font-size: 28px;
        }

        .login-container p {
            color: var(--gray);
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--light-gray);
            border-radius: 10px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--black);
        }

        .btn-login {
            width: 100%;
            background: var(--black);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            opacity: 0.92;
        }

        .signup-link {
            margin-top: 20px;
            font-size: 14px;
        }

        .signup-link a {
            color: var(--black);
            font-weight: 700;
            text-decoration: none;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        footer {
            padding: 40px 0;
            text-align: center;
            color: var(--gray);
            font-size: 13px;
            border-top: 1px solid var(--light-gray);
            background: white;
            margin-top: 40px;
        }

        @media (max-width: 768px) {

            .header-content {
                flex-direction: column;
                gap: 15px;
            }

            nav {
                justify-content: center;
                width: 100%;
            }

            .login-container {
                padding: 25px;
            }
        }
    </style>
</head>

<body>

<header>

    <div class="container header-content">

        <a href="index.html" style="text-decoration: none; color: inherit;">
            <h2>🐾 Clube dos Pets</h2>
        </a>

        <nav>
            <a href="fornecedor.html" class="btn-link">
                Anunciar local
            </a>

            <a href="login.html" class="btn">
                Entrar
            </a>
        </nav>

    </div>

</header>

<main class="container">

    <section class="categories">

        <a href="index.html" class="cat-item" style="text-decoration: none;">
            🐾<br>Todos
        </a>

        <a href="vet.html" class="cat-item" style="text-decoration: none;">
            🏥<br>Vet
        </a>

        <a href="hoteis.html" class="cat-item" style="text-decoration: none;">
            🏨<br>Hotéis
        </a>

        <a href="restaurantes.html" class="cat-item" style="text-decoration: none;">
            🍽️<br>Restaurantes
        </a>

        <a href="shoppings.html" class="cat-item" style="text-decoration: none;">
            🛍️<br>Shoppings
        </a>

        <a href="parques.html" class="cat-item" style="text-decoration: none;">
            🌳<br>Parques
        </a>

    </section>

    <div class="login-container">

        <img src="logo.jpeg" alt="Logo Clube dos Pets">

        <h2>Crie sua conta</h2>

        <p>
            Cadastre-se para acessar locais favoritos e recursos personalizados.
        </p>

        <form id="formCadastroUsuario">

            <div class="form-group">

                <label for="nome">Nome Completo</label>

                <input
                    type="text"
                    id="nome"
                    placeholder="Digite seu nome"
                    required
                >

            </div>

            <div class="form-group">

                <label for="cpf">CPF</label>

                <input
                    type="text"
                    id="cpf"
                    placeholder="000.000.000-00"
                    maxlength="14"
                    required
                >

            </div>

            <div class="form-group">

                <label for="emailCadastro">E-mail</label>

                <input
                    type="email"
                    id="emailCadastro"
                    placeholder="Digite seu e-mail"
                    required
                >

            </div>

            <div class="form-group">

                <label for="senhaCadastro">Senha</label>

                <input
                    type="password"
                    id="senhaCadastro"
                    placeholder="Digite sua senha"
                    required
                >

            </div>

            <button type="submit" class="btn-login">
                Cadastrar
            </button>

        </form>

        <div class="signup-link">
            Já tem uma conta?
            <a href="login.html">Entrar</a>
        </div>

    </div>

</main>

<footer>

    <p>
        © 2026 Clube dos Pets - Encontre o melhor para o seu amigo.
    </p>

</footer>

<script>

    // Máscara CPF
    const campoCpf = document.getElementById('cpf');

    campoCpf.addEventListener('input', (e) => {

        let valor = e.target.value.replace(/\D/g, '');

        valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
        valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
        valor = valor.replace(/(\d{3})(\d{1,2})$/, '$1-$2');

        e.target.value = valor;

    });

</script>

<script src="script.js"></script>

</body>
</html>
