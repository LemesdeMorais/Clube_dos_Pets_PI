<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clube dos Pets | Hotéis e Hospedagens</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilização do Botão Sair */
        .btn-sair {
            background: #717171;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: opacity 0.3s;
            display: inline-block;
        }
        .btn-sair:hover { opacity: 0.8; }
        
        .hidden { display: none !important; }

        nav { display: flex; align-items: center; gap: 15px; }
    </style>
</head>
<body>

<header>
    <div class="container header-content">
        <a href="index.html" style="text-decoration: none; color: inherit;"><h2>🐾 Clube dos Pets</h2></a>
        <nav id="nav-menu">
            <a href="index.html" class="btn-link">Início</a>
            <a href="fornecedor.html" class="btn-link">Anunciar local</a>
            <a href="login.html" id="btn-entrar" class="btn">Entrar</a>
            <button onclick="logout()" id="btn-sair" class="btn-sair hidden">Sair</button>
        </nav>
    </div>
</header>

<main class="container">

    <section class="search-section">
        <div class="search-bar">
            <div class="search-item">
                <label>Destino</label>
                <input type="text" placeholder="Para onde você e seu pet vão?">
            </div>
            <div class="search-item">
                <label>Período</label>
                <input type="text" placeholder="Check-in — Check-out">
            </div>
            <button class="search-btn">🔍</button>
        </div>
    </section>

    <div style="padding: 20px 0;">
        <h2 style="font-size: 22px;">Hotéis e Hospedagens por Temporada</h2>
        <p style="color: var(--gray); font-size: 14px;">Lugares incríveis que recebem seu melhor amigo com todo conforto.</p>
    </div>

    <section class="categories">
        <a href="index.html" class="cat-item" style="text-decoration: none;">🐾<br>Todos</a>
        <a href="vet.html" class="cat-item" style="text-decoration: none;">🏥<br>Vet</a>
        <a href="hoteis.html" class="cat-item active" style="text-decoration: none;">🏨<br>Hotéis</a>
        <a href="restaurantes.html" class="cat-item" style="text-decoration: none;">🍽️<br>Restaurantes</a>
        <a href="shoppings.html" class="cat-item" style="text-decoration: none;">🛍️<br>Shoppings</a>
        <a href="parques.html" class="cat-item" style="text-decoration: none;">🌳<br>Parques</a>
        <a href="mapa.html" class="cat-item" style="text-decoration: none;">📍<br>Mapa</a>
    </section>

    <section id="grid-estabelecimentos" class="grid">
        <p style="text-align:center;padding:40px;color:var(--gray)">Carregando...</p>
    </section>

</main>

<a href="mapa.html" class="floating-map-btn">
    Mostrar mapa 🗺️
</a>

<footer style="padding: 40px 0; text-align: center; color: var(--gray); font-size: 13px; border-top: 1px solid var(--light-gray);">
    <p>© 2026 Clube dos Pets - Viaje com seu Pet</p>
</footer>

<script src="auth.js"></script>
<script>const CATEGORIA_ID = 2;</script>
<script src="categoria-page.js"></script>

</body>
</html>
