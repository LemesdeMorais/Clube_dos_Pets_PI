<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anunciar Local - Clube dos Pets</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: #f8f8f8;
            color: #222;
        }

        :root {
            --black: #111;
            --gray: #666;
            --light-gray: #ddd;
            --white: #fff;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: auto;
        }

        header {
            background: white;
            border-bottom: 1px solid var(--light-gray);
            padding: 15px 0;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav {
            display: flex;
            gap: 10px;
        }

        .btn,
        .btn-link {
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn {
            background: var(--black);
            color: white;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-link {
            color: var(--black);
        }

        .categories {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 25px 0;
        }

        .cat-item {
            min-width: 90px;
            background: white;
            border: 1px solid var(--light-gray);
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
            color: var(--black);
            font-size: 14px;
            transition: 0.3s;
        }

        .cat-item:hover {
            transform: translateY(-2px);
            border-color: var(--black);
        }

        .login-container {
            max-width: 650px;
            margin: 20px auto 60px;
            padding: 40px;
            background: white;
            border-radius: 20px;
            border: 1px solid var(--light-gray);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-area img {
            height: 70px;
            object-fit: contain;
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .login-container p {
            text-align: center;
            color: var(--gray);
            margin-bottom: 35px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--light-gray);
            border-radius: 10px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--black);
            outline: none;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .btn-login {
            width: 100%;
            background: var(--black);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            opacity: 0.92;
        }

        .file-input-label {
            display: block;
            margin-top: 8px;
            color: var(--gray);
            font-size: 13px;
        }

        footer {
            padding: 40px 0;
            text-align: center;
            color: var(--gray);
            font-size: 13px;
            border-top: 1px solid var(--light-gray);
            background: white;
        }

        @media (max-width: 768px) {

            .login-container {
                padding: 25px;
            }

            .header-content {
                flex-direction: column;
                gap: 15px;
            }

            nav {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body>

<header>
    <div class="container header-content">

        <a href="index.html" style="text-decoration: none; color: inherit;">
            <h2>🐾 Clube dos Pets</h2>
        </a>

        <nav>
            <a href="index.html" class="btn-link">Início</a>
            <a href="login.html" class="btn">Entrar</a>
        </nav>

    </div>
</header>

<main class="container">

    <section class="categories">

        <a href="index.html" class="cat-item" style="text-decoration: none;">
            🐾<br>Todos
        </a>

        <a href="vet.html" class="cat-item" style="text-decoration: none;">
            🏥<br>Vet
        </a>

        <a href="hoteis.html" class="cat-item" style="text-decoration: none;">
            🏨<br>Hotéis
        </a>

        <a href="restaurantes.html" class="cat-item" style="text-decoration: none;">
            🍽️<br>Restaurantes
        </a>

        <a href="shoppings.html" class="cat-item" style="text-decoration: none;">
            🛍️<br>Shoppings
        </a>

        <a href="parques.html" class="cat-item" style="text-decoration: none;">
            🌳<br>Parques
        </a>

    </section>

    <div class="login-container">

        <div class="logo-area">
            <img src="logo.jpeg" alt="Logo Clube dos Pets">
        </div>

        <h2>Anunciar Local</h2>

        <p>
            Cadastre seu estabelecimento e alcance milhares de tutores pet friendly.
        </p>

        <form id="formCadastroFornecedor">

            <div class="form-group">
                <label for="nomeLocal">Nome do Local</label>

                <input 
                    type="text" 
                    id="nomeLocal"
                    placeholder="Ex: Hotel Pet Relax"
                    required
                >
            </div>

            <div class="form-group">
                <label for="cnpj">CNPJ</label>

                <input
                    type="text"
                    id="cnpj"
                    placeholder="00.000.000/0000-00"
                    maxlength="18"
                    required
                >
            </div>

            <div class="form-group">
                <label for="categoria">Categoria</label>

                <select id="categoria" required>

                    <option value="" disabled selected>
                        Selecione uma categoria
                    </option>

                    <option value="restaurante">
                        Restaurante / Bar
                    </option>

                    <option value="hotel">
                        Hotel / Hospedagem
                    </option>

                    <option value="vet">
                        Veterinário
                    </option>

                    <option value="shopping">
                        Shopping
                    </option>

                    <option value="parque">
                        Parque / Lazer
                    </option>

                </select>
            </div>

            <div class="form-group">
                <label for="endereco">Endereço Completo</label>

                <input
                    type="text"
                    id="endereco"
                    placeholder="Rua, Número, Bairro - Cidade/SP"
                    required
                >
            </div>

            <div class="form-group">
                <label for="telefone">Telefone</label>

                <input
                    type="text"
                    id="telefone"
                    placeholder="(11) 99999-9999"
                    required
                >
            </div>

            <div class="form-group">
                <label for="email">E-mail para Contato</label>

                <input
                    type="email"
                    id="email"
                    placeholder="contato@empresa.com"
                    required
                >
            </div>

            <div class="form-group">
                <label for="fotos">Fotos do Local</label>

                <input
                    type="file"
                    id="fotos"
                    multiple
                    accept="image/*"
                >

                <span class="file-input-label">
                    Formatos aceitos: JPG e PNG. Máximo de 5 fotos.
                </span>
            </div>

            <div class="form-group">
                <label for="descricao">
                    Diferenciais Pet Friendly
                </label>

                <textarea
                    id="descricao"
                    placeholder="Descreva os diferenciais do local para pets..."
                ></textarea>
            </div>

            <button type="submit" class="btn-login">
                Finalizar Cadastro
            </button>

        </form>

    </div>

</main>

<footer>
    <p>
        © 2026 Clube dos Pets - Encontre o melhor para o seu amigo.
    </p>
</footer>

<script>

    // Máscara CNPJ
    const campoCnpj = document.getElementById('cnpj');

    campoCnpj.addEventListener('input', (e) => {

        let valor = e.target.value.replace(/\D/g, '');

        valor = valor.replace(/^(\d{2})(\d)/, '$1.$2');
        valor = valor.replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3');
        valor = valor.replace(/\.(\d{3})(\d)/, '.$1/$2');
        valor = valor.replace(/(\d{4})(\d)/, '$1-$2');

        e.target.value = valor;

    });

    // Máscara telefone
    const telefone = document.getElementById('telefone');

    telefone.addEventListener('input', (e) => {

        let valor = e.target.value.replace(/\D/g, '');

        valor = valor.replace(/^(\d{2})(\d)/g, '($1) $2');

        valor = valor.replace(/(\d)(\d{4})$/, '$1-$2');

        e.target.value = valor;

    });

</script>

</body>
</html>
